<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Audit Review</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       var(--tg-theme-bg-color, #1c1c1e);
      --surface:  var(--tg-theme-secondary-bg-color, #2c2c2e);
      --text:     var(--tg-theme-text-color, #ffffff);
      --subtext:  var(--tg-theme-hint-color, #8e8e93);
      --accent:   var(--tg-theme-button-color, #007aff);
      --go:       #30d158;
      --skip:     #ff453a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      overflow: hidden;
      touch-action: none;
    }

    /* ── Layout ──────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 12px 16px 20px;
      gap: 12px;
    }

    /* ── Progress bar ─────────────────────────────────── */
    #progress-wrap {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #progress-track {
      flex: 1;
      height: 4px;
      background: var(--surface);
      border-radius: 2px;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    #progress-label {
      font-size: 13px;
      color: var(--subtext);
      flex-shrink: 0;
      min-width: 36px;
      text-align: right;
    }

    /* ── Card deck ────────────────────────────────────── */
    #deck {
      flex: 1;
      position: relative;
    }

    .card {
      position: absolute;
      inset: 0;
      background: var(--surface);
      border-radius: 20px;
      padding: 22px 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      cursor: grab;
      user-select: none;
      will-change: transform;
      transition: box-shadow 0.15s ease;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .card:active { cursor: grabbing; }

    /* swipe overlay labels */
    .card::before,
    .card::after {
      content: attr(data-label);
      position: absolute;
      top: 28px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1px;
      border-radius: 8px;
      padding: 4px 12px;
      border: 3px solid;
      opacity: 0;
      transition: opacity 0.05s;
      pointer-events: none;
    }
    .card::before {
      content: 'GO';
      left: 20px;
      color: var(--go);
      border-color: var(--go);
    }
    .card::after {
      content: 'SKIP';
      right: 20px;
      color: var(--skip);
      border-color: var(--skip);
    }
    .card.show-go::before   { opacity: 1; }
    .card.show-skip::after  { opacity: 1; }

    /* effort badge */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      align-self: flex-start;
    }
    .badge-L { background: #1a3a26; color: #30d158; }
    .badge-M { background: #3a2a10; color: #ff9f0a; }
    .badge-H { background: #3a1214; color: #ff453a; }

    .card-title {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.35;
      color: var(--text);
    }

    .card-section { display: flex; flex-direction: column; gap: 4px; }
    .card-section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--subtext);
    }
    .card-section-body {
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
      opacity: 0.9;
    }

    /* dot indicators */
    #dots {
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      gap: 7px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--surface);
      transition: background 0.2s, transform 0.2s;
    }
    .dot.active   { background: var(--accent); transform: scale(1.25); }
    .dot.decided-go   { background: var(--go); }
    .dot.decided-skip { background: var(--skip); }

    /* ── Action buttons ───────────────────────────────── */
    #actions {
      flex-shrink: 0;
      display: flex;
      gap: 12px;
    }
    .btn {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: 0.75; transform: scale(0.97); }
    .btn-skip { background: rgba(255,69,58,0.15); color: var(--skip); }
    .btn-go   { background: rgba(48,209,88,0.15);  color: var(--go);  }

    /* ── Done screen ──────────────────────────────────── */
    #done-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
      padding: 32px;
      text-align: center;
    }
    #done-screen .done-icon { font-size: 64px; }
    #done-screen h2 { font-size: 24px; font-weight: 700; }
    #done-screen p  { font-size: 15px; color: var(--subtext); line-height: 1.5; }
    #done-btn {
      margin-top: 8px;
      padding: 16px 40px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    /* exit animation */
    @keyframes swipe-out-right {
      to { transform: translateX(120%) rotate(20deg); opacity: 0; }
    }
    @keyframes swipe-out-left {
      to { transform: translateX(-120%) rotate(-20deg); opacity: 0; }
    }
    .exit-right { animation: swipe-out-right 0.35s ease forwards; }
    .exit-left  { animation: swipe-out-left  0.35s ease forwards; }

    /* next card peek */
    .card.next {
      transform: scale(0.94) translateY(12px);
      opacity: 0.6;
      pointer-events: none;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .card.next.promote {
      transform: scale(1) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>

<div id="app">
  <div id="progress-wrap">
    <div id="progress-track"><div id="progress-fill"></div></div>
    <div id="progress-label">1 / 1</div>
  </div>
  <div id="deck"></div>
  <div id="dots"></div>
  <div id="actions">
    <button class="btn btn-skip" id="btn-skip">❌ Skip</button>
    <button class="btn btn-go"   id="btn-go">✅ Go</button>
  </div>
</div>

<div id="done-screen">
  <div class="done-icon">✅</div>
  <h2 id="done-title">Review complete</h2>
  <p id="done-body"></p>
  <button id="done-btn">Send decisions</button>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  // ── Parse findings from URL ──────────────────────────────────────────
  let findings = [];
  try {
    const raw = new URLSearchParams(location.search).get('d') || '';
    findings = JSON.parse(atob(raw));
  } catch (e) {
    findings = [{
      effort: 'L',
      what: 'No findings loaded',
      why: 'Could not parse data from URL.',
      rec: 'Check the bot logs.'
    }];
  }

  const total = findings.length;
  let current = 0;
  const decisions = {}; // index -> 'go' | 'no'

  // ── DOM refs ────────────────────────────────────────────────────────
  const deck        = document.getElementById('deck');
  const dotsEl      = document.getElementById('dots');
  const progFill    = document.getElementById('progress-fill');
  const progLabel   = document.getElementById('progress-label');
  const app         = document.getElementById('app');
  const doneScreen  = document.getElementById('done-screen');
  const doneTitle   = document.getElementById('done-title');
  const doneBody    = document.getElementById('done-body');
  const doneBtn     = document.getElementById('done-btn');

  // ── Build dots ──────────────────────────────────────────────────────
  const dots = findings.map((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    dotsEl.appendChild(d);
    return d;
  });

  // ── Build card element ──────────────────────────────────────────────
  function makeCard(idx, isNext) {
    const f = findings[idx];
    const card = document.createElement('div');
    card.className = 'card' + (isNext ? ' next' : '');

    const badgeClass = 'badge badge-' + (f.effort || 'L');
    card.innerHTML = `
      <span class="${badgeClass}">${f.effort || 'L'}</span>
      <div class="card-title">${esc(f.what)}</div>
      <div class="card-section">
        <div class="card-section-label">Why</div>
        <div class="card-section-body">${esc(f.why)}</div>
      </div>
      <div class="card-section">
        <div class="card-section-label">Recommendation</div>
        <div class="card-section-body">${esc(f.rec)}</div>
      </div>
    `;
    return card;
  }

  function esc(s) {
    return String(s || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // ── Render initial two cards ─────────────────────────────────────────
  let topCard  = null;
  let nextCard = null;

  function renderDeck() {
    deck.innerHTML = '';
    if (current + 1 < total) {
      nextCard = makeCard(current + 1, true);
      deck.appendChild(nextCard);
    } else {
      nextCard = null;
    }
    topCard = makeCard(current, false);
    deck.appendChild(topCard);
    attachSwipe(topCard);
    updateProgress();
  }

  function updateProgress() {
    const pct = total > 1 ? (current / (total - 1)) * 100 : 100;
    progFill.style.width = pct + '%';
    progLabel.textContent = (current + 1) + ' / ' + total;
    dots.forEach((d, i) => {
      d.className = 'dot';
      if (decisions[i] === 'go')  d.classList.add('decided-go');
      else if (decisions[i] === 'no') d.classList.add('decided-skip');
      else if (i === current) d.classList.add('active');
    });
  }

  // ── Decide and advance ──────────────────────────────────────────────
  function decide(choice, card) {
    decisions[current] = choice;

    // animate card out
    card.classList.add(choice === 'go' ? 'exit-right' : 'exit-left');

    // promote next card
    if (nextCard) {
      nextCard.classList.add('promote');
    }

    setTimeout(() => {
      current++;
      if (current >= total) {
        showDone();
      } else {
        renderDeck();
      }
    }, 340);
  }

  // ── Touch / mouse swipe ─────────────────────────────────────────────
  const THRESHOLD = 80; // px to commit a swipe

  function attachSwipe(card) {
    let startX = 0, startY = 0, dx = 0;
    let dragging = false;

    function onStart(x, y) {
      startX = x; startY = y; dx = 0; dragging = true;
      card.style.transition = 'none';
    }
    function onMove(x, y) {
      if (!dragging) return;
      dx = x - startX;
      const dy = y - startY;
      const rot = dx * 0.08;
      card.style.transform = `translateX(${dx}px) rotate(${rot}deg)`;
      const ratio = Math.min(Math.abs(dx) / THRESHOLD, 1);
      card.style.opacity = 1 - ratio * 0.3;
      card.classList.toggle('show-go',   dx >  30);
      card.classList.toggle('show-skip', dx < -30);
    }
    function onEnd() {
      if (!dragging) return;
      dragging = false;
      card.style.transition = '';
      if (dx > THRESHOLD) {
        decide('go', card);
      } else if (dx < -THRESHOLD) {
        decide('no', card);
      } else {
        // snap back
        card.style.transform = '';
        card.style.opacity   = '';
        card.classList.remove('show-go', 'show-skip');
      }
    }

    card.addEventListener('touchstart',  e => onStart(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
    card.addEventListener('touchmove',   e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    card.addEventListener('touchend',    onEnd);
    card.addEventListener('mousedown',   e => onStart(e.clientX, e.clientY));
    window.addEventListener('mousemove', e => { if (dragging) onMove(e.clientX, e.clientY); });
    window.addEventListener('mouseup',   onEnd);
  }

  // ── Button handlers ─────────────────────────────────────────────────
  document.getElementById('btn-go').addEventListener('click', () => {
    if (!topCard || topCard.classList.contains('exit-right') || topCard.classList.contains('exit-left')) return;
    decide('go', topCard);
  });
  document.getElementById('btn-skip').addEventListener('click', () => {
    if (!topCard || topCard.classList.contains('exit-right') || topCard.classList.contains('exit-left')) return;
    decide('no', topCard);
  });

  // ── Done screen ─────────────────────────────────────────────────────
  function showDone() {
    app.style.display = 'none';
    doneScreen.style.display = 'flex';

    const goCount  = Object.values(decisions).filter(d => d === 'go').length;
    const noCount  = Object.values(decisions).filter(d => d === 'no').length;
    const goIds    = Object.entries(decisions)
      .filter(([, d]) => d === 'go')
      .map(([i]) => parseInt(i) + 1)
      .join(', ');

    doneTitle.textContent = goCount > 0 ? `${goCount} approved` : 'Nothing approved';
    doneBody.textContent  = goCount > 0
      ? `${noCount} skipped. Say "go: ${goIds}" in chat to execute.`
      : `All ${noCount} findings skipped.`;
  }

  doneBtn.addEventListener('click', () => {
    tg.sendData(JSON.stringify(decisions));
  });

  // ── Go ──────────────────────────────────────────────────────────────
  renderDeck();
</script>
</body>
</html>
